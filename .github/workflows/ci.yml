name: CI
 
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Nx affected commands
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
 
      - name: Enable Corepack
        run: corepack enable
 
      - name: Setup pnpm
        run: corepack prepare pnpm@latest --activate
 
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
 
      - name: Run Nx Affected Lint
        run: pnpm nx affected -t lint --base=main --parallel=3
 
      - name: Run Nx Affected Test
        run: pnpm nx affected -t test --base=main --parallel=3
 
      - name: Run Nx Affected Build
        run: pnpm nx affected -t build --base=main --parallel=3
 
      - name: Run Workspace Validation Script
        run: python3 scripts/validate_workspace.py
